services:
  - type: web
    name: rekt-ceo-backend
    runtime: node
    plan: starter
    region: oregon
    rootDir: rekt_backend
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm run build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

      - key: CHAIN_ID
        value: 8453
      - key: RPC_URL
        sync: false
      - key: RPC_URL_FALLBACK
        value: https://mainnet.base.org
      - key: BACKEND_PRIVATE_KEY
        sync: false

      - key: MINTER_CONTRACT_ADDRESS
        sync: false
      - key: PFP_COLLECTION_ADDRESS
        sync: false
      - key: MEME_COLLECTION_ADDRESS
        sync: false
      - key: CEO_TOKEN_ADDRESS
        sync: false

      - key: PINATA_JWT
        sync: false
      - key: PINATA_GATEWAY
        value: https://gateway.pinata.cloud

      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: 24h

      - key: CORS_ORIGIN
        sync: false
      - key: CORS_ORIGIN_2
        sync: false

      - key: REDIS_URL
        fromDatabase:
          name: rekt-ceo-redis
          property: connectionString

      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100

      - key: LOG_LEVEL
        value: warn

databases:
  - name: rekt-ceo-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
